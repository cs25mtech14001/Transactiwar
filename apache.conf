<VirtualHost *:80>

    ServerAdmin webmaster@localhost
    DocumentRoot /var/www

    <Directory />
        Require all denied
    </Directory>

    <Directory /var/www/public>
        Options -Indexes -MultiViews
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/logs>
        Require all denied
    </Directory>

    <Files "script.php">
        Require all denied
    </Files>

    <FilesMatch "\.csv$">
        Require all denied
    </FilesMatch>    

    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    AllowEncodedSlashes Off

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

</VirtualHost>
